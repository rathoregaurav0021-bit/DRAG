version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: floodshield-postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-floodshield_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-floodshield_pass}
      POSTGRES_DB: ${POSTGRES_DB:-floodshield_db}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgis_data:

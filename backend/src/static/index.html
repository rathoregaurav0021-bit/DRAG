<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodShield Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: calc(100vh - 64px); }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">FloodShield</h1>
        <div>
            <button id="simulate-btn" class="bg-white text-blue-600 px-4 py-2 rounded font-semibold hover:bg-gray-200 transition">
                Run Simulation
            </button>
        </div>
    </nav>

    <!-- Map Area -->
    <div class="flex-grow relative">
        <div id="map" class="w-full h-full"></div>
        
        <!-- Info Panel -->
        <div class="absolute top-4 right-4 bg-white p-4 rounded shadow-lg z-[1000] w-80">
            <h2 class="text-lg font-bold mb-2 text-gray-800">AI Recommendation</h2>
            <div id="ai-output" class="text-sm text-gray-600">
                Awaiting simulation...
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
